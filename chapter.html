<!DOCTYPE html>
<html lang="en">
<head>

<script>
  window.dataLayer = window.dataLayer || [];

  gtag('config', 'G-LCYWCTM8M5');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Read Nor Verner chapters with illustrations and navigation between episodes." />
  <meta property="og:title" content="Nor Verner | Read Chapter" />
  <meta property="og:description" content="Immersive reading experience for Nor Verner's chapters with artwork and chapter navigation." />
  <meta property="og:type" content="article" />
  <title>Nor Verner | Chapter Reader</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">norverner.com</div>
      <nav class="nav-links" aria-label="Chapter navigation">
        <a href="index.html#home">Home</a>
        <a href="index.html#chapters">Chapters</a>
        <a href="index.html#characters">Characters</a>
        <a href="index.html#powers">Power System</a>
        <a href="index.html#world">World</a>
        <a href="index.html#gallery">Gallery</a>
        <a href="index.html#discord">Discord</a>
      </nav>
    </div>
  </header>

  <main class="section chapter-page">
    <div class="container">
      <article class="chapter-panel">
        <div class="chapter-header">
          <div>
            <span class="eyebrow">Chapter reader</span>
            <h1 id="chapterTitle">Loading...</h1>
            <p id="chapterExcerpt" class="hero-description"></p>
          </div>
          <div class="chapter-meta">
            <span id="chapterPublished">Published: —</span>
            <span id="chapterWords">Words: —</span>
          </div>
        </div>

        <div class="chapter-actions">
          <a id="prevLink" class="button secondary" href="#">Previous</a>
          <a id="nextLink" class="button secondary" href="#">Next</a>
          <a class="button primary" href="index.html#chapters">Back to chapters</a>
        </div>

        <section id="chapterContent" class="chapter-content"></section>

        <div class="chapter-actions bottom-actions">
          <a id="prevLinkBottom" class="button secondary" href="#">Previous</a>
          <a id="nextLinkBottom" class="button secondary" href="#">Next</a>
        </div>
      </article>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>norverner.com — immersive chapter reading for the Nor Verner saga.</p>
      <p>Use a local server to preview and load content correctly.</p>
    </div>
  </footer>

  <script src="assets/js/chapter.js"></script>
</body>
</html>
